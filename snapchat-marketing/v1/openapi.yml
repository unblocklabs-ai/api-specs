              properties:
                ads:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/Ad'
      responses:
        '200':
          description: Ads updated successfully
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
