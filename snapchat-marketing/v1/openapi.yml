        - $ref: '#/components/parameters/adAccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                segments:
                  type: array
                  items:
                    $ref: '#/components/schemas/AudienceSegment'
      responses:
        '200':
          description: Audience segment created successfully
        '400':
          description: Bad request
        '401':
          description: Unauthorized
  /campaigns/{campaign_id}/stats:
    get:
      operationId: getCampaignStats
      summary: Get Campaign Statistics
      description: >-
        Retrieves performance statistics for a specific campaign,
        including impressions, spend, and conversion metrics.
