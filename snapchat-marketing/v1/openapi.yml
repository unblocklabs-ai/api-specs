        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
      responses:
        '200':
          description: Successful retrieval of ad squad stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  total_stats:
                    type: array
                    items:
                      $ref: '#/components/schemas/Stats'
        '401':
          description: Unauthorized
        '404':
          description: Ad squad not found
  /ads/{ad_id}/stats:
    get:
      operationId: getAdStats
      summary: Get Ad Statistics
      description: >-
        Retrieves performance statistics for a specific ad.
      tags:
        - Measurement
      parameters:
        - $ref: '#/components/parameters/adId'
        - $ref: '#/components/parameters/granularity'
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
      responses:
        '200':
          description: Successful retrieval of ad stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  total_stats:
                    type: array
                    items:
                      $ref: '#/components/schemas/Stats'
        '401':
          description: Unauthorized
        '404':
          description: Ad not found
  /adaccounts/{ad_account_id}/stats:
    get:
      operationId: getAdAccountStats
      summary: Get Ad Account Statistics
      description: >-
        Retrieves performance statistics for a specific ad account.
