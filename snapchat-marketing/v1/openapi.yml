        '404':
          description: Campaign not found
  /adaccounts/{ad_account_id}/ads:
    get:
      operationId: listAdsByAdAccount
      summary: List All Ads for an Ad Account
      description: >-
        Retrieves all ads under the specified ad account.
      tags:
