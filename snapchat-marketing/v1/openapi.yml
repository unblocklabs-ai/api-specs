        '200':
          description: Successful retrieval of ads
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  ads:
                    type: array
                    items:
                      type: object
                      properties:
                        ad:
                          $ref: '#/components/schemas/Ad'
        '401':
          description: Unauthorized
        '404':
          description: Ad account not found
  /ads/{ad_id}:
    get:
      operationId: getAd
      summary: Get a Specific Ad
      description: >-
        Retrieves details for a specific ad by its ID.
      tags:
        - Ads
      parameters:
        - $ref: '#/components/parameters/adId'
      responses:
        '200':
          description: Successful retrieval of ad
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  ads:
                    type: array
                    items:
                      type: object
                      properties:
                        ad:
                          $ref: '#/components/schemas/Ad'
        '401':
          description: Unauthorized
        '404':
          description: Ad not found
    delete:
      operationId: deleteAd
      summary: Delete an Ad
      description: >-
        Deletes a specific ad by its ID.
      tags:
        - Ads
      parameters:
        - $ref: '#/components/parameters/adId'
      responses:
        '200':
          description: Ad deleted successfully
        '401':
          description: Unauthorized
        '404':
          description: Ad not found
  /adsquads/{ad_squad_id}/ads/{ad_id}:
    patch:
      operationId: patchAd
      summary: Partially Update an Ad
      description: Partially updates an ad using JSON Patch (RFC 6902).
      tags:
        - Ads
      parameters:
        - $ref: '#/components/parameters/adSquadId'
        - $ref: '#/components/parameters/adId'
      requestBody:
        $ref: '#/components/requestBodies/JsonPatchDocument'
      responses:
        '200':
          description: Ad updated successfully
        '400':
          description: Invalid patch document
        '401':
          description: Unauthorized
        '404':
          description: Ad squad or ad not found
  /adaccounts/{ad_account_id}/creatives:
    get:
      operationId: listCreatives
      summary: List All Creatives for an Ad Account
      description: >-
        Retrieves all creatives associated with the specified ad account.
      tags:
        - Creatives
      parameters:
        - $ref: '#/components/parameters/adAccountId'
      responses:
        '200':
          description: Successful retrieval of creatives
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  creatives:
                    type: array
                    items:
                      type: object
                      properties:
                        creative:
                          $ref: '#/components/schemas/Creative'
        '401':
          description: Unauthorized
        '404':
          description: Ad account not found
    post:
      operationId: createCreative
      summary: Create a Creative
      description: >-
        Creates a new creative under the specified ad account.
      tags:
        - Creatives
      parameters:
        - $ref: '#/components/parameters/adAccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                creatives:
                  type: array
                  items:
                    $ref: '#/components/schemas/Creative'
      responses:
        '200':
          description: Creative created successfully
        '400':
          description: Bad request
        '401':
          description: Unauthorized
    put:
      operationId: updateCreatives
      summary: Update One or More Creatives
      description: >-
        Fully updates one or more creatives under the specified ad account.
        The complete entity must be supplied for each creative.
      tags:
        - Creatives
      parameters:
        - $ref: '#/components/parameters/adAccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - creatives
              properties:
                creatives:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/Creative'
      responses:
        '200':
          description: Creatives updated successfully
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Ad account not found
  /creatives/{creative_id}:
    get:
      operationId: getCreative
      summary: Get a Specific Creative
      description: >-
        Retrieves details for a specific creative by its ID.
      tags:
        - Creatives
      parameters:
        - $ref: '#/components/parameters/creativeId'
      responses:
        '200':
          description: Successful retrieval of creative
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  creatives:
                    type: array
                    items:
                      type: object
                      properties:
                        creative:
                          $ref: '#/components/schemas/Creative'
        '401':
          description: Unauthorized
        '404':
          description: Creative not found
  /adaccounts/{ad_account_id}/creatives/{creative_id}:
    patch:
      operationId: patchCreative
      summary: Partially Update a Creative
      description: Partially updates a creative using JSON Patch (RFC 6902).
      tags:
        - Creatives
      parameters:
        - $ref: '#/components/parameters/adAccountId'
        - $ref: '#/components/parameters/creativeId'
      requestBody:
        $ref: '#/components/requestBodies/JsonPatchDocument'
      responses:
        '200':
          description: Creative updated successfully
        '400':
          description: Invalid patch document
        '401':
          description: Unauthorized
        '404':
          description: Ad account or creative not found
  /adaccounts/{ad_account_id}/media:
    get:
      operationId: listMedia
      summary: List All Media for an Ad Account
      description: >-
        Retrieves all media objects associated with the specified ad account.
      tags:
        - Media
      parameters:
        - $ref: '#/components/parameters/adAccountId'
      responses:
        '200':
          description: Successful retrieval of media
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  media:
                    type: array
                    items:
                      type: object
                      properties:
                        media:
                          $ref: '#/components/schemas/Media'
        '401':
          description: Unauthorized
        '404':
          description: Ad account not found
    post:
      operationId: createMedia
      summary: Create a Media Object
      description: >-
        Creates a new media object under the specified ad account.
        The media object must be created before uploading the actual
        media file.
      tags:
        - Media
      parameters:
        - $ref: '#/components/parameters/adAccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                media:
                  type: array
                  items:
                    $ref: '#/components/schemas/Media'
      responses:
        '200':
          description: Media object created successfully
        '400':
          description: Bad request
        '401':
          description: Unauthorized
  /media/{media_id}/upload:
    post:
      operationId: uploadMedia
      summary: Upload Media Content
      description: >-
        Uploads the actual media file content to an existing media object.
        Supports images, videos, and playable media. Maximum chunk size
        is 32MB per request.
      tags:
        - Media
      parameters:
        - $ref: '#/components/parameters/mediaId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: >-
                    The media file to upload (image, video, or ZIP for playable)
      responses:
        '200':
          description: Media uploaded successfully
        '400':
          description: Bad request - invalid file or exceeds size limit
        '401':
          description: Unauthorized
        '404':
          description: Media object not found
  /adaccounts/{ad_account_id}/segments:
    get:
      operationId: listAudienceSegments
      summary: List All Audience Segments for an Ad Account
