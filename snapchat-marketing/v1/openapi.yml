      responses:
        '200':
          description: Successful retrieval of ad account stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  total_stats:
                    type: array
                    items:
                      $ref: '#/components/schemas/Stats'
        '401':
          description: Unauthorized
        '404':
          description: Ad account not found
components:
  securitySchemes:
    bearerAuth:
      type: oauth2
      description: >-
        OAuth 2.0 authorization. Access tokens are obtained via the
        authorization code flow and expire after 3600 seconds.
        Refresh tokens can be used to obtain new access tokens.
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.snapchat.com/login/oauth2/authorize
          tokenUrl: https://accounts.snapchat.com/login/oauth2/access_token
          scopes:
            snapchat-marketing-api: Access to the Snapchat Marketing API
  requestBodies:
    JsonPatchDocument:
      required: true
      description: A JSON Patch document as defined by RFC 6902.
      content:
        application/json-patch+json:
          schema:
            type: array
            minItems: 1
            items:
              $ref: '#/components/schemas/JsonPatchOperation'
  parameters:
    organizationId:
      name: organization_id
      in: path
      required: true
      description: The unique identifier of the organization
      schema:
        type: string
    adAccountId:
      name: ad_account_id
      in: path
      required: true
      description: The unique identifier of the ad account
      schema:
        type: string
    campaignId:
      name: campaign_id
      in: path
      required: true
      description: The unique identifier of the campaign
      schema:
        type: string
    adSquadId:
      name: ad_squad_id
      in: path
      required: true
      description: The unique identifier of the ad squad
      schema:
        type: string
    adId:
      name: ad_id
      in: path
      required: true
      description: The unique identifier of the ad
      schema:
        type: string
    creativeId:
      name: creative_id
      in: path
      required: true
      description: The unique identifier of the creative
      schema:
        type: string
    mediaId:
      name: media_id
      in: path
      required: true
      description: The unique identifier of the media object
      schema:
        type: string
    granularity:
      name: granularity
      in: query
      required: false
      description: >-
        The time granularity for statistics. Determines how data
        points are grouped in the response.
      schema:
        type: string
        enum:
          - TOTAL
          - DAY
          - HOUR
    startTime:
      name: start_time
      in: query
      required: false
      description: >-
        The start time for the statistics query in ISO 8601 format.
      schema:
        type: string
        format: date-time
    endTime:
      name: end_time
      in: query
      required: false
      description: >-
        The end time for the statistics query in ISO 8601 format.
      schema:
        type: string
        format: date-time
  schemas:
    JsonPatchOperation:
      type: object
      required:
        - op
        - path
      properties:
        op:
          type: string
          enum:
            - add
            - remove
            - replace
            - test
        path:
          type: string
          description: JSON Pointer identifying the field to modify.
        value:
          description: Value used by add, replace, or test operations.
      additionalProperties: false
    Organization:
      type: object
      description: >-
        An Organization represents a brand, partner, or ad agency
        on the Snapchat advertising platform.
      properties:
        id:
          type: string
          description: The unique identifier of the organization
        updated_at:
          type: string
          format: date-time
          description: The timestamp when the organization was last updated
        created_at:
          type: string
          format: date-time
          description: The timestamp when the organization was created
        name:
          type: string
          description: The name of the organization
        address_line_1:
          type: string
          description: First line of the organization address
        locality:
          type: string
          description: City or locality of the organization
        administrative_district_level_1:
          type: string
          description: State or province of the organization
        country:
          type: string
          description: Country code of the organization
        postal_code:
          type: string
          description: Postal code of the organization
        type:
          type: string
          description: The type of organization
          enum:
            - ENTERPRISE
            - PARTNER
        my_display_name:
          type: string
          description: The display name of the authenticated user within this organization
        my_invited_email:
          type: string
          format: email
          description: The email address used to invite the authenticated user
        my_member_id:
          type: string
          description: The member ID of the authenticated user within this organization
    AdAccount:
      type: object
      description: >-
        An Ad Account contains advertising campaigns and is owned
        by an Organization. Each Ad Account has one or more Funding Sources.
      properties:
        id:
          type: string
          description: The unique identifier of the ad account
        updated_at:
          type: string
          format: date-time
          description: Timestamp of last update
        created_at:
          type: string
          format: date-time
          description: Timestamp of creation
        name:
          type: string
          description: The name of the ad account
        type:
          type: string
          description: The type of ad account
          enum:
            - PARTNER
            - DIRECT
        status:
          type: string
          description: The status of the ad account
          enum:
            - ACTIVE
            - PAUSED
            - DISABLED
        organization_id:
          type: string
          description: The ID of the parent organization
        funding_source_ids:
          type: array
          items:
            type: string
          description: Array of funding source IDs associated with this account
        currency:
          type: string
          description: The currency code for the ad account (e.g., USD)
        timezone:
          type: string
          description: The timezone of the ad account (e.g., America/Los_Angeles)
        advertiser:
          type: string
          description: The name of the advertiser
    FundingSource:
      type: object
      description: >-
        A Funding Source represents a payment method for an organization,
        such as a credit card, PayPal account, or line of credit.
      properties:
        id:
          type: string
          description: The unique identifier of the funding source
        updated_at:
          type: string
          format: date-time
          description: Timestamp of last update
        created_at:
          type: string
          format: date-time
          description: Timestamp of creation
        type:
          type: string
          description: The type of funding source
          enum:
            - CREDIT_CARD
            - PAYPAL
            - LINE_OF_CREDIT
            - COUPON
        organization_id:
          type: string
          description: The ID of the parent organization
        status:
          type: string
          description: The status of the funding source
        currency:
          type: string
          description: The currency code
        total_budget_micro:
          type: integer
          format: int64
          description: Total budget in micro-currency units
        available_credit_micro:
          type: integer
          format: int64
          description: Available credit in micro-currency units
    Campaign:
      type: object
      description: >-
        A Campaign defines a business objective and organizes Ad Squads.
        It provides aggregate statistics for all ad squads within it.
      properties:
        id:
          type: string
          description: The unique identifier of the campaign
        updated_at:
          type: string
          format: date-time
          description: Timestamp of last update
        created_at:
          type: string
          format: date-time
          description: Timestamp of creation
        name:
          type: string
          description: The name of the campaign
        ad_account_id:
          type: string
          description: The ID of the parent ad account
        status:
          type: string
          description: The status of the campaign
          enum:
            - ACTIVE
            - PAUSED
        daily_budget_micro:
          type: integer
          format: int64
          description: Daily budget in micro-currency units
        lifetime_spend_cap_micro:
          type: integer
          format: int64
          description: Lifetime spend cap in micro-currency units
        start_time:
          type: string
          format: date-time
          description: The start time of the campaign
        end_time:
          type: string
          format: date-time
          description: The end time of the campaign
        objective_v2_properties:
          type: object
          description: >-
            The objective properties for the campaign using the v2 objective
            format, which replaces the deprecated objective field.
          properties:
            objective:
              type: string
              description: The campaign objective type
    AdSquad:
      type: object
      description: >-
        An Ad Squad organizes ads within a campaign, defining targeting
        criteria, budget allocation, schedule, and bid strategy.
      properties:
        id:
          type: string
          description: The unique identifier of the ad squad
        updated_at:
          type: string
          format: date-time
          description: Timestamp of last update
        created_at:
          type: string
          format: date-time
          description: Timestamp of creation
        name:
          type: string
          description: The name of the ad squad
        campaign_id:
          type: string
          description: The ID of the parent campaign
        status:
          type: string
          description: The status of the ad squad
          enum:
            - ACTIVE
            - PAUSED
        type:
          type: string
          description: The delivery type of the ad squad
          enum:
            - SNAP_ADS
            - STORY_ADS
        placement:
          type: string
          description: Where ads will be placed
        bid_micro:
          type: integer
          format: int64
          description: The bid amount in micro-currency units
        daily_budget_micro:
          type: integer
          format: int64
          description: Daily budget in micro-currency units
        lifetime_budget_micro:
          type: integer
          format: int64
          description: Lifetime budget in micro-currency units
        start_time:
          type: string
          format: date-time
          description: The start time of the ad squad
        end_time:
          type: string
          format: date-time
          description: The end time of the ad squad
        targeting:
          type: object
          description: Targeting criteria for the ad squad
    Ad:
      type: object
      description: >-
        An Ad is an individual ad unit delivered to users. Each Ad
        belongs to an Ad Squad and references a Creative.
      properties:
        id:
          type: string
          description: The unique identifier of the ad
        updated_at:
          type: string
          format: date-time
          description: Timestamp of last update
        created_at:
          type: string
          format: date-time
          description: Timestamp of creation
        name:
          type: string
          description: The name of the ad
        ad_squad_id:
          type: string
          description: The ID of the parent ad squad
        creative_id:
          type: string
          description: The ID of the creative used by this ad
        status:
          type: string
          description: The status of the ad
          enum:
            - ACTIVE
            - PAUSED
        type:
          type: string
          description: The type of ad
    Creative:
      type: object
      description: >-
        A Creative defines the visual and interactive content of an ad,
        including media references and call-to-action elements.
      properties:
        id:
          type: string
          description: The unique identifier of the creative
        updated_at:
          type: string
          format: date-time
          description: Timestamp of last update
        created_at:
          type: string
          format: date-time
          description: Timestamp of creation
        name:
          type: string
          description: The name of the creative
        ad_account_id:
          type: string
          description: The ID of the parent ad account
        type:
          type: string
          description: The type of creative
          enum:
            - SNAP_AD
            - APP_INSTALL
            - LONGFORM_VIDEO
            - WEB_VIEW
            - DEEP_LINK
            - LENS
            - COLLECTION
            - DYNAMIC
            - PREVIEW
        headline:
          type: string
          description: The headline text
          maxLength: 34
        brand_name:
          type: string
          description: The brand name displayed on the creative
          maxLength: 25
        shareable:
          type: boolean
          description: Whether the creative can be shared by users
        call_to_action:
          type: string
          description: The call-to-action type
          enum:
            - INSTALL_NOW
            - WATCH_MORE
            - VIEW_MORE
            - SIGN_UP
            - SHOP_NOW
            - BUY_NOW
            - GET_NOW
            - BOOK_NOW
            - LISTEN
            - ORDER_NOW
            - PLAY
            - APPLY_NOW
            - DOWNLOAD
            - SEND
            - MORE
        top_snap_media_id:
          type: string
          description: The media ID for the top snap
        top_snap_crop_position:
          type: string
          description: Crop position for the top snap media
    Media:
      type: object
      description: >-
        A Media object represents an uploaded media asset such as
        an image, video, or playable content used in creatives.
      properties:
        id:
          type: string
          description: The unique identifier of the media object
        updated_at:
          type: string
          format: date-time
          description: Timestamp of last update
        created_at:
          type: string
          format: date-time
          description: Timestamp of creation
        name:
          type: string
          description: The name of the media object
        ad_account_id:
          type: string
          description: The ID of the parent ad account
        type:
          type: string
          description: The type of media
          enum:
            - IMAGE
            - VIDEO
            - PLAYABLE
        media_status:
          type: string
          description: The processing status of the media
          enum:
            - PENDING_UPLOAD
            - READY
            - ERROR
    AudienceSegment:
      type: object
      description: >-
        An Audience Segment defines a group of users for ad targeting,
        including custom audiences, Snap Audience Match, pixel-based
        audiences, and lookalike audiences.
      properties:
        id:
          type: string
          description: The unique identifier of the segment
        updated_at:
          type: string
          format: date-time
          description: Timestamp of last update
        created_at:
          type: string
          format: date-time
          description: Timestamp of creation
        name:
          type: string
          description: The name of the segment
        ad_account_id:
          type: string
          description: The ID of the parent ad account
        description:
          type: string
          description: A description of the segment
        status:
          type: string
          description: The status of the segment
          enum:
            - ACTIVE
            - PAUSED
        source_type:
          type: string
          description: The source type of the audience segment
          enum:
            - FIRST_PARTY
            - THIRD_PARTY
            - LOOKALIKE
        approximate_number_users:
          type: integer
          description: Approximate number of users in the segment
    Stats:
      type: object
      description: >-
        Performance statistics for an advertising entity including
        impressions, spend, swipe-ups, and conversion metrics.
      properties:
        id:
          type: string
          description: The ID of the entity these stats belong to
        type:
          type: string
          description: The type of entity
        granularity:
          type: string
          description: The time granularity of the stats
        stats:
          type: object
          properties:
            impressions:
              type: integer
              description: Total number of impressions
            swipes:
              type: integer
              description: Total number of swipe-ups
            spend:
              type: number
              format: double
              description: Total spend in micro-currency units
            video_views:
              type: integer
              description: Total number of video views
