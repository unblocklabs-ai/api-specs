openapi: 3.1.0
info:
  title: Snapchat Ads API
  description: >-
    The Snapchat Ads API allows developers to programmatically create,
    manage, and optimize advertising campaigns on the Snapchat platform.
    It provides endpoints for managing organizations, ad accounts,
    campaigns, ad squads, ads, creatives, media, funding sources,
    audience segments, and measurement reporting. The API supports the
    full advertising lifecycle from campaign setup through reporting
    and optimization.
  version: '2026-07-11'
  contact:
    name: Snap for Developers
    url: https://developers.snap.com
  termsOfService: https://snap.com/en-US/terms
externalDocs:
  description: Snapchat Ads API Documentation
  url: https://developers.snap.com/marketing-api/Ads-API/introduction
x-unblocklabs-provenance:
  status: curated-unofficial
  verifiedAt: '2026-07-11'
  seed:
    name: API Evangelist Snapchat Ads API OpenAPI
    url: https://raw.githubusercontent.com/api-evangelist/snapchat/refs/heads/main/openapi/snapchat-ads-api-openapi.yml
  officialDocumentation:
    - https://developers.snap.com/marketing-api/Ads-API/introduction
    - https://developers.snap.com/marketing-api/Ads-API/authentication
    - https://developers.snap.com/marketing-api/Ads-API/api-patterns
    - https://developers.snap.com/marketing-api/Ads-API/ad-accounts
    - https://developers.snap.com/marketing-api/Ads-API/campaigns
    - https://developers.snap.com/marketing-api/Ads-API/ad-squads
    - https://developers.snap.com/marketing-api/Ads-API/ads
    - https://developers.snap.com/marketing-api/Ads-API/creatives
  notes: >-
    This is an UnblockLabs-curated contract assembled from Snap's public
    documentation because Snap does not publish an official OpenAPI document.
    Operation availability and schemas should be re-verified when Snap updates
    its Marketing API documentation.
servers:
  - url: https://adsapi.snapchat.com/v1
    description: Production Server
tags:
  - name: Ad Accounts
    description: >-
      Ad Accounts are owned by an Organization and contain Ad Campaigns.
      They have one or more Funding Sources.
  - name: Ad Squads
    description: >-
      Ad Squads organize ads within a campaign, defining targeting,
      budget, schedule, and bid strategy.
  - name: Ads
    description: >-
      Ads are the individual ad units that are delivered to users.
      Each Ad belongs to an Ad Squad and references a Creative.
  - name: Audience Segments
    description: >-
      Audience Segments allow advertisers to define and manage
      custom audiences for ad targeting, including Snap Audience
      Match, lookalike audiences, and pixel-based audiences.
  - name: Campaigns
    description: >-
      Campaigns define a business objective and organize Ad Squads,
      allowing advertisers to view aggregate statistics.
  - name: Creatives
    description: >-
      Creatives define the visual and interactive content of ads,
      including images, videos, and call-to-action overlays.
  - name: Funding Sources
    description: >-
      Funding Sources represent payment methods associated with an
      organization, including credit cards, PayPal, and lines of credit.
  - name: Measurement
    description: >-
      Measurement endpoints provide campaign performance statistics
      and reporting data at various levels of the ad hierarchy.
  - name: Media
    description: >-
      Media endpoints handle uploading and managing media assets
      such as images and videos used in creatives.
  - name: Organizations
    description: >-
      Organizations represent brands, partners, or ad agencies.
      Organizations are created via Snap Business Manager.
security:
  - bearerAuth: []
paths:
  /me/organizations:
    get:
      operationId: listOrganizations
      summary: List All Organizations
      description: >-
        Retrieves all organizations the authenticated user has access to,
        along with the ad accounts beneath each organization.
      tags:
        - Organizations
      responses:
        '200':
          description: Successful retrieval of organizations
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  organizations:
                    type: array
                    items:
                      type: object
                      properties:
                        organization:
                          $ref: '#/components/schemas/Organization'
        '401':
          description: Unauthorized - invalid or expired access token
        '403':
          description: Forbidden - insufficient permissions
  /organizations/{organization_id}:
    get:
      operationId: getOrganization
      summary: Get a Specific Organization
      description: >-
        Retrieves details for a specific organization by its ID.
      tags:
        - Organizations
      parameters:
        - $ref: '#/components/parameters/organizationId'
      responses:
        '200':
          description: Successful retrieval of organization
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  organizations:
                    type: array
                    items:
                      type: object
                      properties:
                        organization:
                          $ref: '#/components/schemas/Organization'
        '401':
          description: Unauthorized
        '404':
          description: Organization not found
  /organizations/{organization_id}/adaccounts:
    get:
      operationId: listAdAccounts
      summary: List All Ad Accounts for an Organization
      description: >-
        Retrieves all ad accounts associated with the specified organization.
      tags:
        - Ad Accounts
      parameters:
        - $ref: '#/components/parameters/organizationId'
      responses:
        '200':
          description: Successful retrieval of ad accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  adaccounts:
                    type: array
                    items:
                      type: object
                      properties:
                        adaccount:
                          $ref: '#/components/schemas/AdAccount'
        '401':
          description: Unauthorized
        '404':
          description: Organization not found
    post:
      operationId: createAdAccount
      summary: Create an Ad Account
      description: >-
        Creates a new ad account under the specified organization.
      tags:
        - Ad Accounts
      parameters:
        - $ref: '#/components/parameters/organizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                adaccounts:
                  type: array
                  items:
                    $ref: '#/components/schemas/AdAccount'
      responses:
        '200':
          description: Ad account created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  adaccounts:
                    type: array
                    items:
                      type: object
                      properties:
                        adaccount:
                          $ref: '#/components/schemas/AdAccount'
        '400':
          description: Bad request - invalid parameters
        '401':
          description: Unauthorized
    put:
      operationId: updateAdAccount
      summary: Update an Ad Account
      description: >-
        Updates one or more ad accounts under the specified organization.
      tags:
        - Ad Accounts
      parameters:
        - $ref: '#/components/parameters/organizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                adaccounts:
                  type: array
                  items:
                    $ref: '#/components/schemas/AdAccount'
      responses:
        '200':
          description: Ad account updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  adaccounts:
                    type: array
                    items:
                      type: object
                      properties:
                        adaccount:
                          $ref: '#/components/schemas/AdAccount'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
  /adaccounts/{ad_account_id}:
    get:
      operationId: getAdAccount
      summary: Get a Specific Ad Account
      description: >-
        Retrieves details for a specific ad account by its ID.
      tags:
        - Ad Accounts
      parameters:
        - $ref: '#/components/parameters/adAccountId'
      responses:
        '200':
          description: Successful retrieval of ad account
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  adaccounts:
                    type: array
                    items:
                      type: object
                      properties:
                        adaccount:
                          $ref: '#/components/schemas/AdAccount'
        '401':
          description: Unauthorized
        '404':
          description: Ad account not found
  /organizations/{organization_id}/fundingsources:
    get:
      operationId: listFundingSources
      summary: List All Funding Sources for an Organization
      description: >-
        Retrieves all funding sources associated with the specified
        organization, including credit cards, PayPal, and lines of credit.
      tags:
        - Funding Sources
      parameters:
        - $ref: '#/components/parameters/organizationId'
      responses:
        '200':
          description: Successful retrieval of funding sources
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  fundingsources:
                    type: array
                    items:
                      type: object
                      properties:
                        fundingsource:
                          $ref: '#/components/schemas/FundingSource'
        '401':
          description: Unauthorized
        '404':
          description: Organization not found
  /adaccounts/{ad_account_id}/campaigns:
    get:
      operationId: listCampaigns
      summary: List All Campaigns for an Ad Account
      description: >-
        Retrieves all campaigns associated with the specified ad account.
      tags:
        - Campaigns
      parameters:
        - $ref: '#/components/parameters/adAccountId'
      responses:
        '200':
          description: Successful retrieval of campaigns
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  campaigns:
                    type: array
                    items:
                      type: object
                      properties:
                        campaign:
                          $ref: '#/components/schemas/Campaign'
        '401':
          description: Unauthorized
        '404':
          description: Ad account not found
    post:
      operationId: createCampaign
      summary: Create a Campaign
      description: >-
        Creates a new campaign under the specified ad account.
      tags:
        - Campaigns
      parameters:
        - $ref: '#/components/parameters/adAccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                campaigns:
                  type: array
                  items:
                    $ref: '#/components/schemas/Campaign'
      responses:
        '200':
          description: Campaign created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  campaigns:
                    type: array
                    items:
                      type: object
                      properties:
                        campaign:
                          $ref: '#/components/schemas/Campaign'
        '400':
          description: Bad request - invalid parameters
        '401':
          description: Unauthorized
    put:
      operationId: updateCampaigns
      summary: Update One or More Campaigns
      description: >-
        Fully updates one or more campaigns under the specified ad account.
        The complete entity must be supplied for each campaign.
      tags:
        - Campaigns
      parameters:
        - $ref: '#/components/parameters/adAccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - campaigns
              properties:
                campaigns:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    $ref: '#/components/schemas/Campaign'
      responses:
        '200':
          description: Campaigns updated successfully
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Ad account not found
  /campaigns/{campaign_id}:
    get:
      operationId: getCampaign
      summary: Get a Specific Campaign
      description: >-
        Retrieves details for a specific campaign by its ID.
      tags:
        - Campaigns
      parameters:
        - $ref: '#/components/parameters/campaignId'
      responses:
        '200':
          description: Successful retrieval of campaign
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  campaigns:
                    type: array
                    items:
                      type: object
                      properties:
                        campaign:
                          $ref: '#/components/schemas/Campaign'
        '401':
          description: Unauthorized
        '404':
          description: Campaign not found
    delete:
      operationId: deleteCampaign
      summary: Delete a Campaign
      description: >-
        Deletes a specific campaign by its ID.
      tags:
        - Campaigns
      parameters:
        - $ref: '#/components/parameters/campaignId'
      responses:
        '200':
          description: Campaign deleted successfully
        '401':
          description: Unauthorized
        '404':
          description: Campaign not found
  /adaccounts/{ad_account_id}/campaigns/{campaign_id}:
    patch:
      operationId: patchCampaign
      summary: Partially Update a Campaign
      description: Partially updates a campaign using JSON Patch (RFC 6902).
      tags:
        - Campaigns
      parameters:
        - $ref: '#/components/parameters/adAccountId'
        - $ref: '#/components/parameters/campaignId'
      requestBody:
        $ref: '#/components/requestBodies/JsonPatchDocument'
      responses:
        '200':
          description: Campaign updated successfully
        '400':
          description: Invalid patch document
        '401':
          description: Unauthorized
        '404':
          description: Ad account or campaign not found
  /campaigns/{campaign_id}/adsquads:
    get:
      operationId: listAdSquadsByCampaign
      summary: List All Ad Squads for a Campaign
      description: >-
        Retrieves all ad squads associated with the specified campaign.
      tags:
        - Ad Squads
      parameters:
        - $ref: '#/components/parameters/campaignId'
      responses:
        '200':
          description: Successful retrieval of ad squads
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  adsquads:
                    type: array
                    items:
                      type: object
                      properties:
                        adsquad:
                          $ref: '#/components/schemas/AdSquad'
        '401':
          description: Unauthorized
        '404':
          description: Campaign not found
    post:
      operationId: createAdSquads
      summary: Create One or More Ad Squads
      description: Creates one or more ad squads under the specified campaign.
      tags:
        - Ad Squads
      parameters:
        - $ref: '#/components/parameters/campaignId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - adsquads
              properties:
                adsquads:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/AdSquad'
      responses:
        '200':
          description: Ad squads created successfully
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Campaign not found
    put:
      operationId: updateAdSquads
      summary: Update One or More Ad Squads
      description: >-
        Fully updates one or more ad squads under the specified campaign.
        The complete entity must be supplied for each ad squad.
      tags:
        - Ad Squads
      parameters:
        - $ref: '#/components/parameters/campaignId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - adsquads
              properties:
                adsquads:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/AdSquad'
      responses:
        '200':
          description: Ad squads updated successfully
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Campaign not found
  /adaccounts/{ad_account_id}/adsquads:
    get:
      operationId: listAdSquadsByAdAccount
      summary: List All Ad Squads for an Ad Account
      description: >-
        Retrieves all ad squads associated with the specified ad account.
      tags:
        - Ad Squads
      parameters:
        - $ref: '#/components/parameters/adAccountId'
      responses:
        '200':
          description: Successful retrieval of ad squads
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  adsquads:
                    type: array
                    items:
                      type: object
                      properties:
                        adsquad:
                          $ref: '#/components/schemas/AdSquad'
        '401':
          description: Unauthorized
        '404':
          description: Ad account not found
  /adsquads/{ad_squad_id}:
    get:
      operationId: getAdSquad
      summary: Get a Specific Ad Squad
      description: >-
        Retrieves details for a specific ad squad by its ID.
      tags:
        - Ad Squads
      parameters:
        - $ref: '#/components/parameters/adSquadId'
      responses:
        '200':
          description: Successful retrieval of ad squad
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  adsquads:
                    type: array
                    items:
                      type: object
                      properties:
                        adsquad:
                          $ref: '#/components/schemas/AdSquad'
        '401':
          description: Unauthorized
        '404':
          description: Ad squad not found
    delete:
      operationId: deleteAdSquad
      summary: Delete an Ad Squad
      description: >-
        Deletes a specific ad squad by its ID.
      tags:
        - Ad Squads
      parameters:
        - $ref: '#/components/parameters/adSquadId'
      responses:
        '200':
          description: Ad squad deleted successfully
        '401':
          description: Unauthorized
        '404':
          description: Ad squad not found
  /campaigns/{campaign_id}/adsquads/{ad_squad_id}:
    patch:
      operationId: patchAdSquad
      summary: Partially Update an Ad Squad
      description: Partially updates an ad squad using JSON Patch (RFC 6902).
      tags:
        - Ad Squads
      parameters:
        - $ref: '#/components/parameters/campaignId'
        - $ref: '#/components/parameters/adSquadId'
      requestBody:
        $ref: '#/components/requestBodies/JsonPatchDocument'
      responses:
        '200':
          description: Ad squad updated successfully
        '400':
          description: Invalid patch document
        '401':
          description: Unauthorized
        '404':
          description: Campaign or ad squad not found
  /adsquads/{ad_squad_id}/ads:
    get:
      operationId: listAdsByAdSquad
      summary: List All Ads for an Ad Squad
      description: >-
        Retrieves all ads within the specified ad squad.
      tags:
        - Ads
      parameters:
        - $ref: '#/components/parameters/adSquadId'
      responses:
        '200':
          description: Successful retrieval of ads
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  ads:
                    type: array
                    items:
                      type: object
                      properties:
                        ad:
                          $ref: '#/components/schemas/Ad'
        '401':
          description: Unauthorized
        '404':
          description: Ad squad not found
    post:
      operationId: createAd
      summary: Create an Ad
      description: >-
        Creates a new ad within the specified ad squad.
      tags:
        - Ads
      parameters:
        - $ref: '#/components/parameters/adSquadId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ads:
                  type: array
                  items:
                    $ref: '#/components/schemas/Ad'
      responses:
        '200':
          description: Ad created successfully
        '400':
          description: Bad request
        '401':
          description: Unauthorized
    put:
      operationId: updateAds
      summary: Update One or More Ads
      description: >-
        Fully updates one or more ads under the specified ad squad.
        The complete entity must be supplied for each ad.
      tags:
        - Ads
      parameters:
        - $ref: '#/components/parameters/adSquadId'
