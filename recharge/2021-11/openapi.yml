  "/async_batches":
    post:
      tags:
      - Async Batches
      summary: Create a batch
      operationId: async_batch_endpoints_create
      description: "In order to create, retrieve, or process batches, the API token
        requires the write_batches permission. Additional permissions are required,
        dependent upon the indicated batch_type. For example, for a batch type of
        discount_create, the API token requires the write_discounts permission. \n\n
        Create a new batch, and indicate the desired outcome of the batch using batch_type.
        \n\nCAUTION\n\n Async batches and their tasks will only be retained in Recharge
        for one month after batch creation.\n\n\n Available batch types\n\n The async_batches
        API supports many functions, each identified as a batch_type. Typically, the
        task body for a batch_type will be representative of a single request to our
        standard endpoints, however, some variations may be present.\nRelated guides:
        Examples of Async Batches\n\nBatches will only leverage resources from the
        same version they are created in. e.g. a batch created with `2021-11` will
        only process tasks from the `2021-11` version."
      parameters:
      - "$ref": "#/components/parameters/rechargeVersion"
      responses:
        '201':
          description: successful response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  async_batch:
                    type: object
                    additionalProperties: true
                    properties:
                      id:
                        type: integer
                      batch_type:
                        type: string
                      closed_at: {}
                      created_at:
                        type: string
                        format: date-time
                      deleted_at: {}
                      fail_task_count:
                        type: integer
                      status:
                        type: string
                      submitted_at: {}
                      success_task_count:
                        type: integer
                      total_task_count:
                        type: integer
                      updated_at:
                        type: string
                        format: date-time
                      version:
                        type: string
              example:
                async_batch:
                  id: 19
                  batch_type: discount_create
                  closed_at:
                  created_at: '2022-10-12T20:16:09+00:00'
                  deleted_at:
                  fail_task_count: 0
                  status: not_started
                  submitted_at:
                  success_task_count: 0
                  total_task_count: 0
                  updated_at: '2022-10-12T20:16:09+00:00'
                  version: 2021-11
      x-recharge-scopes:
      - write_batches
      x-source-anchor: https://developer.stage.getrecharge.com/2021-11/async_batch_endpoints/async_batch_endpoints_create
      requestBody:
