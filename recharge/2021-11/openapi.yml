      summary: List orders
      operationId: orders_list
      description: "Returns a list of orders. \n\nHTTP request examples\n `GET /orders`
        \n\n `GET /orders?customer_id=123` \n\n `GET /orders?address_id=4587216` \n\n
        `GET /orders?charge_id=45678542` \n\n `GET /orders?created_at_min=2016-05-18&created_at_max=2016-06-18`"
      parameters:
      - "$ref": "#/components/parameters/rechargeVersion"
      - name: address_id
        in: query
        required: false
        description: |-
          Filter orders by address.

          `GET /orders/?address_id=123` will return all orders for the given `address_id`.
        schema:
          type: string
          description: Filter orders by address.
      - name: charge_id
        in: query
        required: false
        description: |-
          Filter orders by charge.

