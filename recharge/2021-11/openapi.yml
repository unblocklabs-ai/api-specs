  "/charges/{id}/capture_payment":
    post:
      tags:
      - Charges
      summary: Capture a charge
      operationId: charge_capture
      description: "If you are leveraging the authorize/capture workflow with Recharge,
        the `charge/{id}/capture_payment` endpoint is how to capture the funds of
        a previously authorized `Charge`. \n\nCapture Window\nYou can only capture
        payment on `Charges` that have been authorized within the last 7 days. This
        is a limitation of payment providers/financial institutions and Recharge cannot
        configure or override this limit. Any `Charges` that are attempted to be captured
        beyond that 7 day window may result in an error indicating the `Charge` cannot
        be captured. \n\n As a result, Recharge provides a `charge/uncaptured` `Webhook`.
        If subscribed, this `Webhook` will notify you of any `Charges` that are not
        captured 6 days after authorization. Please refer to the webhooks section
        for more information.\n\nThe `/charges/{id}/capture_payment` endpoint is available
        to Recharge Plus merchants in the Recharge Closed Beta group. If you’re interested
        in leveraging the Recharge `capture_payment` endpoint, reach out to your account
        manager or our Support team. \nLearn more about Recharge Plus."
