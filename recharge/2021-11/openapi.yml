          Filter `Charges` by ID.

          If passing multiple values, must be comma separated. Non-integer values will result in a `422` error.
        schema:
          type: string
          description: Filter `Charges` by ID.
      - name: limit
        in: query
        required: false
        description: The amount of results.
        schema:
          type: string
          description: The amount of results.
          default: 50
          maximum: 250
      - name: page
        in: query
        required: false
        description: |-
          The page to show.

          Page-based pagination has been deprecated but still available to use for pages up to a 100. If you need data past this point, use cursor pagination.
        schema:
          type: string
          description: The page to show.
          default: 1
          deprecated: true
        deprecated: true
      - name: purchase_item_id
        in: query
        required: false
        description: Filter `Charges` by a `Subscription` or `Onetime` ID.
        schema:
          type: string
          description: Filter `Charges` by a `Subscription` or `Onetime` ID.
      - name: purchase_item_ids
        in: query
        required: false
        description: Filter `Charges` by a comma-separated list of `Subscription`
          or `Onetime` IDs.
        schema:
          type: string
          description: Filter `Charges` by a comma-separated list of `Subscription`
            or `Onetime` IDs.
      - name: scheduled_at
        in: query
        required: false
        description: Filter `Charges` by specific scheduled charge date.
        schema:
          type: string
          description: Filter `Charges` by specific scheduled charge date.
      - name: scheduled_at_max
        in: query
        required: false
        description: Show `Charges` scheduled to be processed before the given date.
        schema:
          type: string
          description: Show `Charges` scheduled to be processed before the given date.
      - name: scheduled_at_min
        in: query
        required: false
        description: Show `Charges` scheduled to be processed after the given date.
        schema:
          type: string
          description: Show `Charges` scheduled to be processed after the given date.
      - name: sort_by
        in: query
        required: false
        description: |-
          Sort listed `Charges` in a specific order.
          Available sort options: `id-asc`, `id-desc`, `updated_at-asc`, `updated_at-desc`, `scheduled_at-asc`, `scheduled_at-desc`.
        schema:
          type: string
          description: |-
            Sort listed `Charges` in a specific order.
            Available sort options: `id-asc`, `id-desc`, `updated_at-asc`, `updated_at-desc`, `scheduled_at-asc`, `scheduled_at-desc`.
      - name: status
        in: query
        required: false
        description: |-
