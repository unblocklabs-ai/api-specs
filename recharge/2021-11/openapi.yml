                        type: object
                        description: An object containing the associated product ID
                          as it appears in the external system.
                        additionalProperties: false
                        properties:
                          ecommerce:
                            type: string
                            description: The product id as it appears in the external
                              e-commerce platform. The `external_product_id` of the
                              `Product` record in Recharge, linking a `Plan` to a
                              `Product`.
                      external_variant_id:
                        type: object
                        description: An object containing the associated variant ID
