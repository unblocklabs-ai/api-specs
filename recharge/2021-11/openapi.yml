  "/bundle_selections":
    get:
      tags:
      - Bundle Selections
      summary: List bundle selections
      operationId: bundle_selection_list
      description: "Returns a list of `BundleSelections`.\n\nHTTP request examples\n`GET
        /bundle_selections?purchase_item_ids=:purchase_item_id_1,:purchase_item_id_2`\n\n`GET
        /bundle_selections?bundle_variant_ids=:bundle_variant_id_1,:bundle_variant_id_2`\n\n`GET
        /bundle_selections?limit=1`\n\n`GET /bundle_selections?limit=1&page=2`\n\n`GET
        /bundle_selections?sort_by=updated_at-desc`\n\nReturned `BundleSelections`
        are sorted descending by ID value by default.\n\n`BundleSelections` endpoints
        are available for Recharge Plus merchants. If you’re interested in leveraging
        the Recharge `bundle_selections` endpoints, reach out to your account manager
        or our Support team. \nLearn more about Recharge Plus."
      parameters:
      - "$ref": "#/components/parameters/rechargeVersion"
      - name: purchase_item_ids
        in: query
        required: false
        description: |-
          Filter `BundleSelections` by `Subscription` or `Onetime` ID.

          If passing multiple values, must be comma separated. Non-integer values will result in a `422` error.
        schema:
          type: string
          description: Filter `BundleSelections` by `Subscription` or `Onetime` ID.
      - name: bundle_variant_ids
        in: query
        required: false
        description: |-
          Filter `BundleSelections` by `BundleVariants`.

          If passing multiple values, must be comma separated. Non-integer values will result in a `422` error.
        schema:
          type: string
          description: Filter `BundleSelections` by `BundleVariants`.
      - name: limit
        in: query
        required: false
        description: The amount of results.
        schema:
          type: string
          description: The amount of results.
          default: 50
          maximum: 250
      - name: page
        in: query
        required: false
        description: |-
          The page to show.

          Page-based pagination has been deprecated but still available to use for pages up to a 100. If you need data past this point, use cursor pagination.
        schema:
          type: string
          description: The page to show.
          default: 1
          deprecated: true
        deprecated: true
      - name: sort_by
        in: query
        required: false
        description: |-
          Sort listed `BundleSelections` in a specific order.
          Available sort options: `id-asc`, `id-desc`, `updated_at-asc`, `updated_at-desc`.
        schema:
          type: string
          description: |-
            Sort listed `BundleSelections` in a specific order.
            Available sort options: `id-asc`, `id-desc`, `updated_at-asc`, `updated_at-desc`.
      - name: active_purchase_items
        in: query
        required: false
        description: |-
          Bundle selections are not directly linked to Subscriptions. By default, the endpoint returns Bundle Selections, even those associated with cancelled subscriptions, unless the Bundle Selection has been deleted.
          To exclude cancelled subscriptions from your results, include `active_purchase_items=true` in your query.
        schema:
          type: boolean
          description: |-
            Bundle selections are not directly linked to Subscriptions. By default, the endpoint returns Bundle Selections, even those associated with cancelled subscriptions, unless the Bundle Selection has been deleted.
            To exclude cancelled subscriptions from your results, include `active_purchase_items=true` in your query.
      responses:
        '200':
          description: successful response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  next_cursor: {}
                  previous_cursor: {}
                  bundle_selections:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                      properties:
                        id:
                          type: integer
                        bundle_variant:
                          type: integer
                        purchase_item_id:
                          type: integer
                        created_at:
                          type: string
                          format: date-time
                        external_product_id:
                          type: string
                        external_variant_id:
                          type: string
                        items:
                          type: array
                          items:
                            type: object
                            additionalProperties: true
                            properties:
                              id:
                                type: integer
                              collection_id:
                                type: string
                              collection_source:
                                type: string
                              created_at:
                                type: string
                                format: date-time
                              external_product_id:
                                type: string
                              external_variant_id:
                                type: string
                              quantity:
                                type: integer
                              updated_at:
                                type: string
                                format: date-time
                        updated_at:
                          type: string
                          format: date-time
              example:
                next_cursor:
                previous_cursor:
                bundle_selections:
                - id: 100714428
                  bundle_variant: 382417
                  purchase_item_id: 199820883
                  created_at: '2022-08-26T18:31:28+00:00'
                  external_product_id: '7121697210548'
                  external_variant_id: '41450875650228'
                  items:
                  - id: 541
                    collection_id: '287569608884'
                    collection_source: shopify
                    created_at: '2022-08-26T18:31:28+00:00'
                    external_product_id: '7121693671604'
                    external_variant_id: '41450853105844'
                    quantity: 3
                    updated_at: '2022-08-26T18:52:41+00:00'
                  updated_at: '2022-08-26T18:31:28+00:00'
      x-recharge-scopes:
      - read_subscriptions
      x-source-anchor: https://developer.stage.getrecharge.com/2021-11/bundle_selections/bundle_selection_list
