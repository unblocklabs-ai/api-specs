  "/charges":
    get:
      tags:
      - Charges
      summary: List charges
      operationId: charge_list
      description: "Returns a list of `Charges`.\n\nHTTP request examples\n`GET /charges?address_id=:address_id`\n\n`GET
        /charges?created_at_min=2016-05-18&created_at_max=2016-06-18`\n\n`GET /charges?customer_id=:customer_id`\n\n`GET
        /charges?discount_code=10PERCENTOFF`\n\n`GET /charges?discount_id=:discount_id`\n\n`GET
        /charges?external_order_id=:external_order_id`\n\n`GET /charges?ids=1123551,262667345,12341535`\n\n`GET
        /charges?purchase_item_id=:purchase_item_id`\n\n`GET /charges?scheduled_at=2016-06-18`\n\n`GET
        /charges?scheduled_at_min=2016-05-18&scheduled_at_max=2016-06-18`\n\n`GET
        /charges?sort_by=id-desc`\n\n`GET /charges?status=queued`\n\n`GET /charges?status=queued,refunded,partially_refunded`\n\n`GET
        /charges?updated_at_min=2016-05-18&updated_at_max=2016-06-18`\n\n`GET /charges?processed_at_min=2022-01-18&processed_at_max=2022-02-18`\n\nStarting
        March 19th, 2025, processed charges (those where status equals success, refunded,
        or partially- refunded) that have a value for processed_at greater than 90
        days in the past will no longer appear in responses. As a result, you may
        receive a partial data set or an empty list. \n\n Charge data processed over
        90 days ago will remain available through the  Exports tool in the Recharge
        merchant portal and within the  Merchant portal UI. \n\nExamples of unaffected
        API calls: \n[LIST CHARGES] `/charges?status=queued` \n[LIST CHARGES] `/charges?status=error`
        \n\nExamples of API calls that may return partial results: \n[LIST CHARGES]
        `/charges?processed_at_min=2024-01-01` (this would only return results that
        have a processed_at date in the last 90 days)\n[LIST CHARGES] `/charges?status=success,queued`
        (this would return all queued charges but only return success charges that
        have a processed_at date in the last 90 days)\n\nExample of API calls that
        will result in an empty list:\n[LIST CHARGES] `/charges?processed_at_max=2024-01-01`
        (any date over 90 days old)\n\nReminder: returned charges are sorted ascending
        by id value by default."
      parameters:
      - "$ref": "#/components/parameters/rechargeVersion"
      - name: address_id
        in: query
        required: false
        description: Filter `Charges` by `Address`.
        schema:
          type: string
          description: Filter `Charges` by `Address`.
      - name: created_at_max
        in: query
        required: false
        description: Show `Charges` created before the given date.
        schema:
          type: string
          description: Show `Charges` created before the given date.
      - name: created_at_min
        in: query
        required: false
        description: Show `Charges` created after the given date.
        schema:
          type: string
          description: Show `Charges` created after the given date.
      - name: customer_id
        in: query
        required: false
        description: Filter `Charges` by `Customer`.
        schema:
          type: string
          description: Filter `Charges` by `Customer`.
      - name: discount_code
        in: query
        required: false
        description: List `Charges` that contain the given `discount_code`.
        schema:
          type: string
          description: List `Charges` that contain the given `discount_code`.
      - name: discount_id
        in: query
        required: false
        description: List `Charges` that contain the given `discount_id`.
        schema:
          type: string
          description: List `Charges` that contain the given `discount_id`.
      - name: external_order_id
        in: query
        required: false
        description: Filter `Charges` by the associated order ID in the external e-commerce
          platform.
        schema:
          type: string
          description: Filter `Charges` by the associated order ID in the external
            e-commerce platform.
      - name: ids
