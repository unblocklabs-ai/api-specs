  "/async_batches/{batch_id}/tasks":
    post:
      tags:
      - Async Batches
      summary: Create a batch task
      operationId: async_batch_tasks_create
      description: "A batch contains operations of similar type (indicated by batch_type),
        called tasks. A task is typically representative of a single API request,
        with a body parameter containing the standard request body for the associated
        batch_type. A single request to add tasks may contain up to 1,000 tasks, and
        a batch may contain up to 10,000 tasks.  \n\n\n ##HTTP examples \n\n `POST
        /async_batches//tasks`\n\nBatches will only leverage resources from the same
        version they are created in. e.g. a batch created with `2021-11` will only
        process tasks from the `2021-11` version."
      parameters:
      - "$ref": "#/components/parameters/rechargeVersion"
