        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                purchase_item_id:
                  type: integer
                  description: The ID of the `PurchaseItem` associated with the `BundleSelection`.
                plan_id:
                  type: integer
                  description: A Recharge Plan ID. If provided in a dynamically-priced
                    Bundle, the unit price of each product variant will be inferred
                    from the plan associated with the ID; otherwise, it will be inferred
                    from the plan with the greatest discount for each product in the
                    selection. This is not used in fixed-priced Bundles.
                items:
                  type: array
                  description: A list of `item` objects, each containing information
